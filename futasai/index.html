<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA基本設定 -->
    <meta name="theme-color" content="#4F46E5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />

    <!-- iOS Safari PWA設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ふたサイ" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- OGP（SNSシェア用） -->
    <meta property="og:title" content="ふたりの財布 — ふたサイ" />
    <meta property="og:description" content="カップル・夫婦のための割り勘管理アプリ。毎日の支払いをトントンに。" />
    <meta property="og:type" content="website" />

    <!-- favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>ふたりの財布 — ふたサイ</title>

    <style>
      /* Safe Area（ノッチ・ホームバー対応） */
      :root {
        --sat: env(safe-area-inset-top);
        --sab: env(safe-area-inset-bottom);
        --sal: env(safe-area-inset-left);
        --sar: env(safe-area-inset-right);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        height: 100%;
        width: 100%;
        overscroll-behavior: none;
      }
      body {
        background: #FAFAF8;
        -webkit-font-smoothing: antialiased;
        -webkit-tap-highlight-color: transparent;
        /* ノッチ上部のパディング */
        padding-top: var(--sat);
      }
      /* スクロールバー非表示 */
      ::-webkit-scrollbar { display: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
