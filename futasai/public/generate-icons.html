<!DOCTYPE html>
<!-- このファイルをブラウザで開き、ボタンを押してアイコン画像を生成・保存してください -->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>アイコン生成</title>
  <style>
    body { font-family: sans-serif; padding: 24px; background: #f5f5f5; }
    button { margin: 8px; padding: 10px 20px; background: #4F46E5; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; }
    canvas { display: block; margin: 12px 0; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
    h2 { color: #333; margin-bottom: 16px; }
  </style>
</head>
<body>
  <h2>👛 ふたサイ アイコン生成ツール</h2>
  <p>下のボタンを押してアイコンを生成し、<code>public/</code> フォルダに保存してください。</p>

  <button onclick="generate(192, 'icon-192.png')">icon-192.png を生成・保存</button>
  <button onclick="generate(512, 'icon-512.png')">icon-512.png を生成・保存</button>
  <button onclick="generate(180, 'apple-touch-icon.png')">apple-touch-icon.png を生成・保存</button>

  <div id="preview"></div>

  <script>
    function generate(size, filename) {
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");

      // 背景グラデーション
      const grad = ctx.createLinearGradient(0, 0, size, size);
      grad.addColorStop(0, "#4F46E5");
      grad.addColorStop(1, "#7C3AED");
      ctx.fillStyle = grad;

      // 角丸四角形
      const r = size * 0.22;
      ctx.beginPath();
      ctx.moveTo(r, 0);
      ctx.lineTo(size - r, 0);
      ctx.quadraticCurveTo(size, 0, size, r);
      ctx.lineTo(size, size - r);
      ctx.quadraticCurveTo(size, size, size - r, size);
      ctx.lineTo(r, size);
      ctx.quadraticCurveTo(0, size, 0, size - r);
      ctx.lineTo(0, r);
      ctx.quadraticCurveTo(0, 0, r, 0);
      ctx.closePath();
      ctx.fill();

      // 絵文字
      ctx.font = `${size * 0.54}px system-ui`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("👛", size / 2, size / 2 + size * 0.03);

      // プレビュー表示
      canvas.title = filename;
      document.getElementById("preview").appendChild(canvas);

      // ダウンロード
      const a = document.createElement("a");
      a.download = filename;
      a.href = canvas.toDataURL("image/png");
      a.click();
    }
  </script>
</body>
</html>
